<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Islam Super App</title>
<style>
  :root{--bg:#0E6B54;--ink:#1E241F;--soft:#71756E;--card:#F4EFE6}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);background:#fff;line-height:1.6}
  header{background:var(--bg);color:#fff;padding:48px 20px;text-align:center}
  header h1{margin:0;font-size:28px}
  header p{margin:8px 0 0;opacity:.9}
  main{max-width:760px;margin:0 auto;padding:32px 20px}
  .links{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
  .links a{display:inline-block;background:var(--card);color:var(--ink);text-decoration:none;padding:12px 18px;border-radius:12px;font-weight:600}
  .langbar{font-size:14px;margin-bottom:16px}
  .langbar a{margin:0 6px;text-decoration:none;color:var(--bg)}
  footer{color:var(--soft);text-align:center;padding:24px;font-size:14px}
</style>
</head>
<body>
<header>
  <h1>Islam Super App</h1>
  <p id="tag"></p>
</header>
<main>
  <div class="langbar">🌐
    <a href="?lang=tr">Türkçe</a> · <a href="?lang=en">English</a> · <a href="?lang=ar">العربية</a>
  </div>
  <p id="intro"></p>
  <div class="links">
    <a id="lp" href="./gizlilik.html"></a>
    <a id="lt" href="./kullanim-kosullari.html"></a>
  </div>
</main>
<footer>© <span id="y"></span> Islam Super App · <a href="mailto:mustafaturkan.apps@gmail.com">mustafaturkan.apps@gmail.com</a></footer>
<script>
(function(){
  var q=new URLSearchParams(location.search).get('lang');
  var nav=(navigator.language||'en').slice(0,2).toLowerCase();
  var ok=['tr','en','ar'];
  var lang=ok.indexOf(q)>=0?q:(['tr','ar'].indexOf(nav)>=0?nav:'en');
  document.documentElement.lang=lang;
  document.documentElement.dir=(lang==='ar')?'rtl':'ltr';
  var t={
    tr:{tag:"Vaktinde namaz, kalbinde huzur.",intro:"Islam Super App; namaz vakitleri, Kur'an-ı Kerim, kıble, zikirmatik, dualar ve ibadet takibi sunan bir mobil uygulamadır.",p:"Gizlilik Politikası",tr2:"Kullanım Koşulları"},
    en:{tag:"Pray on time, find peace in your heart.",intro:"Islam Super App is a mobile app offering prayer times, the Holy Qur'an, qibla, tasbih, supplications and worship tracking.",p:"Privacy Policy",tr2:"Terms of Use"},
    ar:{tag:"صلِّ في وقتها، وتجد السكينة في قلبك.",intro:"تطبيق Islam Super App تطبيق جوّال يقدّم أوقات الصلاة والقرآن الكريم والقبلة والمسبحة والأدعية ومتابعة العبادة.",p:"سياسة الخصوصية",tr2:"شروط الاستخدام"}
  }[lang];
  document.getElementById('tag').textContent=t.tag;
  document.getElementById('intro').textContent=t.intro;
  document.getElementById('lp').textContent=t.p;
  document.getElementById('lt').textContent=t.tr2;
  document.getElementById('y').textContent=new Date().getFullYear();
})();
</script>
</body>
</html>
